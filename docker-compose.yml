version: '3.8'
services:
  mysql:
    image: mysql:8.3
    container_name: export-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: export_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
